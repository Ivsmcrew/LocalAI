services:
  {{CONTAINER_NAME}}:
    image: {{DOCKER_IMAGE}}
    container_name: {{CONTAINER_NAME}}
    ports:
      - "{{WEBUI_PORT}}:8080"
    environment:
      OLLAMA_BASE_URL: http://host.docker.internal:{{OLLAMA_PORT}}
      # gemma2/llama and many small models reject Ollama's tools API — use legacy mode
      DEFAULT_MODEL_PARAMS: '{"function_calling":"default"}'
      DEFAULT_MODEL_METADATA: '{"capabilities":{"builtin_tools":false,"web_search":false,"code_interpreter":false,"image_generation":false}}'
    volumes:
      - "{{CONTAINER_NAME}}-data:/app/backend/data"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

volumes:
  "{{CONTAINER_NAME}}-data":
