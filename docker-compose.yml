services:
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    ports:
      - "3000:8080"
    environment:
      OLLAMA_BASE_URL: http://host.docker.internal:11434
      DEFAULT_MODEL_PARAMS: '{"function_calling":"default"}'
      DEFAULT_MODEL_METADATA: '{"capabilities":{"builtin_tools":false,"web_search":false,"code_interpreter":false,"image_generation":false}}'
    volumes:
      - open-webui-data:/app/backend/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

volumes:
  open-webui-data:
